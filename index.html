<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auxilior Photo v2.0 - Theater Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --surface: #1c1c1e;
            --primary: #FFD700;
            --accent: #ff4757;
            --success: #2ed573;
            --text-main: #f1f2f6;
            --text-muted: #747d8c;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0 0 100px 0; }
        
        .top-bar { background: var(--surface); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
        .app-title { font-size: 1.2rem; font-weight: 800; margin: 0; letter-spacing: 1px; }
        .app-title span { color: var(--primary); }
        .version { font-size: 0.6rem; background: #333; padding: 3px 8px; border-radius: 12px; margin-left: 8px; vertical-align: middle; }

        .status-indicator { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; font-weight: 600; background: #000; padding: 6px 12px; border-radius: 20px; border: 1px solid #333; }
        .dot { width: 10px; height: 10px; border-radius: 50%; background: var(--text-muted); transition: 0.3s ease; }
        .dot.listening { background: var(--success); box-shadow: 0 0 10px var(--success); animation: pulse 1.5s infinite; }
        .dot.paused { background: var(--primary); }
        .dot.error { background: var(--accent); }

        @keyframes pulse { 0% { transform: scale(0.95); opacity: 0.8; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.95); opacity: 0.8; } }

        .container { padding: 20px; max-width: 800px; margin: 0 auto; }

        .alert-box { background: rgba(255, 215, 0, 0.1); border: 1px dashed var(--primary); color: var(--primary); padding: 12px; border-radius: 8px; font-size: 0.9rem; text-align: center; margin-bottom: 20px; font-weight: 500; }

        .card { background: var(--surface); border-radius: 12px; padding: 18px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 1px solid #2f3542; }
        .card-header { font-size: 0.8rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 15px; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }

        .input-group { display: flex; flex-direction: column; gap: 15px; }
        .file-upload-wrapper { position: relative; }
        .file-upload-wrapper input[type="file"] { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: var(--text-main); font-family: monospace; box-sizing: border-box; }
        
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .time-box label { display: block; font-size: 0.75rem; color: var(--text-muted); margin-bottom: 5px; }
        .time-box input[type="time"] { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 8px; color: var(--primary); font-size: 1.2rem; font-weight: bold; text-align: center; box-sizing: border-box; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1) sepia(1) saturate(5) hue-rotate(10deg); }

        .log-area { display: flex; flex-direction: column; gap: 12px; }
        .log-card { background: #000; border-left: 4px solid var(--primary); border-radius: 8px; padding: 15px; position: relative; }
        .log-times { display: flex; justify-content: space-between; margin-bottom: 10px; font-family: monospace; font-size: 0.85rem; }
        .log-in { color: var(--success); }
        .log-out { color: var(--accent); }
        .log-data { display: flex; align-items: center; gap: 15px; }
        .log-num { background: #111; color: var(--primary); border: 1px solid #333; font-size: 1.5rem; font-weight: 900; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 8px; flex-shrink: 0; }
        .log-text { font-size: 0.9rem; color: #a4b0be; line-height: 1.4; overflow: hidden; }
        .log-excel-data { display: block; color: var(--text-main); font-weight: 600; margin-top: 4px; }
        
        .floating-controls { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(28, 28, 30, 0.95); backdrop-filter: blur(10px); padding: 15px 20px; display: flex; gap: 10px; border-top: 1px solid #333; z-index: 1000; justify-content: center; }
        .ctrl-btn { flex: 1; max-width: 200px; padding: 15px; border: none; border-radius: 12px; font-size: 0.9rem; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .ctrl-btn svg { width: 24px; height: 24px; }
        
        .btn-record { background: var(--accent); color: white; }
        .btn-pause { background: var(--primary); color: #000; display: none; }
        .btn-stop { background: #333; color: white; display: none; }
        .btn-export { background: #3742fa; color: white; width: 100%; margin-top: 20px; }

        .btn-record:active { transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="top-bar">
        <h1 class="app-title">AUXILIOR <span>Photo</span><span class="version">v2.0</span></h1>
        <div class="status-indicator" id="statusBox">
            <div class="dot" id="micDot"></div>
            <span id="statusText">Apagado</span>
        </div>
    </div>

    <div class="container">
        <div class="alert-box">
            ⚠️ <strong>ATENCIÓN:</strong> Baja el volumen de tu teléfono a cero absoluto para evitar los pitidos de Google al grabar.
        </div>

        <div class="card">
            <div class="card-header">📊 1. Base de Datos Excel</div>
            <div class="file-upload-wrapper">
                <input type="file" id="excelFile" accept=".xlsx, .xls">
            </div>
            <div id="fileStatus" style="font-size: 0.8rem; color: var(--success); margin-top: 10px; display: none;">✅ Archivo cargado y listo en memoria.</div>
        </div>

        <div class="card">
            <div class="card-header">⏱ 2. Sincronización de Relojes</div>
            <div class="time-grid">
                <div class="time-box">
                    <label>Hora Foto (Cámara)</label>
                    <input type="time" step="1" id="timeExif" required>
                </div>
                <div class="time-box">
                    <label>Hora Actual (App)</label>
                    <input type="time" step="1" id="timeApp" required>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">🎙 3. Registro de Danzas</div>
            <div class="log-area" id="logContainer">
                <div style="text-align: center; color: var(--text-muted); font-size: 0.9rem; padding: 20px;">
                    El registro de audios aparecerá aquí abajo...
                </div>
            </div>
            <button class="ctrl-btn btn-export" id="btnExport">📥 EXPORTAR EXCEL (.XLSX)</button>
        </div>
    </div>

    <div class="floating-controls">
        <button class="ctrl-btn btn-record" id="btnRecord">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            Grabar
        </button>
        <button class="ctrl-btn btn-pause" id="btnPause">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            Pausar
        </button>
        <button class="ctrl-btn btn-stop" id="btnStop">
            <svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
            Detener
        </button>
    </div>

    <script>
        // --- ESTADO GLOBAL Y VARIABLES ---
        class TheaterLogger {
            constructor() {
                this.workbook = null;
                this.sheetName = null;
                this.originalData = [];
                this.logEvents = [];
                
                this.isRecording = false;
                this.isPaused = false;
                this.wakeLock = null;
                this.recognition = null;
                this.activeEntryId = null;

                this.initDOM();
                this.initSpeech();
                this.attachEvents();
            }

            initDOM() {
                this.ui = {
                    excelFile: document.getElementById('excelFile'),
                    fileStatus: document.getElementById('fileStatus'),
                    timeExif: document.getElementById('timeExif'),
                    timeApp: document.getElementById('timeApp'),
                    btnRecord: document.getElementById('btnRecord'),
                    btnPause: document.getElementById('btnPause'),
                    btnStop: document.getElementById('btnStop'),
                    btnExport: document.getElementById('btnExport'),
                    logContainer: document.getElementById('logContainer'),
                    micDot: document.getElementById('micDot'),
                    statusText: document.getElementById('statusText')
                };
            }

            // --- LECTURA NATIVA DE EXCEL (.XLSX) ---
            attachEvents() {
                this.ui.excelFile.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (!file) return;
                    
                    const reader = new FileReader();
                    reader.onload = (evt) => {
                        try {
                            const data = evt.target.result;
                            this.workbook = XLSX.read(data, {type: 'binary'});
                            this.sheetName = this.workbook.SheetNames[0];
                            const sheet = this.workbook.Sheets[this.sheetName];
                            
                            // Guardamos la matriz exacta para exportar igualito
                            this.originalData = XLSX.utils.sheet_to_json(sheet, {header: 1, defval: ""});
                            this.ui.fileStatus.style.display = 'block';
                            this.ui.fileStatus.innerText = `✅ Excel cargado: ${this.originalData.length - 1} filas detectadas.`;
                        } catch (err) {
                            alert("Error al leer el archivo Excel.");
                        }
                    };
                    reader.readAsBinaryString(file);
                });

                this.ui.btnRecord.addEventListener('click', () => this.startSession());
                this.ui.btnPause.addEventListener('click', () => this.togglePause());
                this.ui.btnStop.addEventListener('click', () => this.stopSession());
                this.ui.btnExport.addEventListener('click', () => this.exportRealExcel());
            }

            // --- WAKE LOCK (MANTENER PANTALLA VIVA) ---
            async requestWakeLock() {
                try {
                    if ('wakeLock' in navigator) {
                        this.wakeLock = await navigator.wakeLock.request('screen');
                        console.log('Pantalla mantenida encendida.');
                    }
                } catch (err) {
                    console.log('WakeLock no soportado o denegado.');
                }
            }

            releaseWakeLock() {
                if (this.wakeLock !== null) {
                    this.wakeLock.release().then(() => this.wakeLock = null);
                }
            }

            // --- MOTOR DE VOZ RESILIENTE ---
            initSpeech() {
                const SpeechReq = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechReq) {
                    alert("Tu navegador no soporta el motor de voz nativo. Usa Chrome en Android o Safari en iOS.");
                    return;
                }

                this.recognition = new SpeechReq();
                this.recognition.lang = 'es-PY';
                this.recognition.continuous = true;
                this.recognition.interimResults = false;

                this.recognition.onstart = () => {
                    this.updateUIStatus('listening');
                };

                this.recognition.onresult = (event) => {
                    if (this.isPaused) return; // Filtro de pausa

                    const transcript = event.results[event.results.length - 1][0].transcript;
                    const numbers = transcript.match(/\d+/g);
                    
                    if (numbers) {
                        const now = new Date();
                        const timeStr = String(now.getHours()).padStart(2, '0') + ':' + 
                                        String(now.getMinutes()).padStart(2, '0') + ':' + 
                                        String(now.getSeconds()).padStart(2, '0');
                        
                        numbers.forEach(num => this.processAnnouncedNumber(num, timeStr, transcript));
                    }
                };

                this.recognition.onerror = (event) => {
                    console.error("Error de voz:", event.error);
                    if (event.error === 'not-allowed') {
                        alert("Permiso de micrófono denegado.");
                        this.stopSession();
                    }
                };

                this.recognition.onend = () => {
                    // SISTEMA DE AUTO-RESURRECCIÓN
                    if (this.isRecording && !this.isPaused) {
                        try { this.recognition.start(); } catch (e) {}
                    } else if (this.isPaused) {
                        this.updateUIStatus('paused');
                    } else {
                        this.updateUIStatus('stopped');
                    }
                };
            }

            updateUIStatus(state) {
                if (state === 'listening') {
                    this.ui.micDot.className = 'dot listening';
                    this.ui.statusText.innerText = "Escuchando...";
                    this.ui.statusText.style.color = "var(--success)";
                } else if (state === 'paused') {
                    this.ui.micDot.className = 'dot paused';
                    this.ui.statusText.innerText = "En Pausa (Música)";
                    this.ui.statusText.style.color = "var(--primary)";
                } else {
                    this.ui.micDot.className = 'dot';
                    this.ui.statusText.innerText = "Apagado";
                    this.ui.statusText.style.color = "var(--text-muted)";
                }
            }

            // --- LÓGICA CORE: INICIO, CIERRE Y CRUCE DE DATOS ---
            processAnnouncedNumber(num, timeStr, rawText) {
                // 1. Cerrar la danza anterior
                if (this.activeEntryId) {
                    const prevEntry = this.logEvents.find(e => e.id === this.activeEntryId);
                    if (prevEntry && !prevEntry.endTime) {
                        prevEntry.endTime = timeStr;
                        const outSpan = document.getElementById(`out-${this.activeEntryId}`);
                        if (outSpan) outSpan.innerText = timeStr;
                    }
                }

                // 2. Buscar datos en Excel en memoria
                let excelMatch = "No encontrado en Excel";
                if (this.originalData.length > 1) {
                    const headers = this.originalData[0];
                    const rowData = this.originalData.slice(1).find(row => String(row[0]).trim() === String(num).trim());
                    if (rowData) {
                        // Construye un resumen visual: Ej "Obra: Cascanueces, Bailarina: Maria"
                        excelMatch = headers.map((h, i) => rowData[i] ? `${h}: ${rowData[i]}` : null).filter(Boolean).join(" | ");
                    }
                }

                // 3. Crear nueva danza
                const newId = Date.now().toString();
                this.logEvents.push({
                    id: newId,
                    num: num,
                    startTime: timeStr,
                    endTime: "",
                    raw: rawText,
                    displayData: excelMatch
                });
                
                this.activeEntryId = newId;
                this.renderNewLogCard(newId, num, timeStr, rawText, excelMatch);
            }

            renderNewLogCard(id, num, timeStr, rawText, excelMatch) {
                if (this.logEvents.length === 1) this.ui.logContainer.innerHTML = ''; // Limpiar mensaje inicial
                
                const div = document.createElement('div');
                div.className = 'log-card';
                div.innerHTML = `
                    <div class="log-times">
                        <span class="log-in">▶ INICIO: ${timeStr}</span>
                        <span class="log-out">⏹ FIN: <span id="out-${id}">--:--:--</span></span>
                    </div>
                    <div class="log-data">
                        <div class="log-num">${num}</div>
                        <div class="log-text">
                            <em>"${rawText}"</em>
                            <span class="log-excel-data">${excelMatch}</span>
                        </div>
                    </div>
                `;
                this.ui.logContainer.prepend(div);
            }

            // --- CONTROLES DE SESIÓN ---
            startSession() {
                this.requestWakeLock();
                this.isRecording = true;
                this.isPaused = false;
                try { this.recognition.start(); } catch (e) {}
                
                this.ui.btnRecord.style.display = 'none';
                this.ui.btnPause.style.display = 'flex';
                this.ui.btnStop.style.display = 'flex';
            }

            togglePause() {
                this.isPaused = !this.isPaused;
                if (this.isPaused) {
                    this.recognition.stop(); // Fuerza el corte, el onend detectará isPaused
                    this.ui.btnPause.innerHTML = '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>Reanudar';
                    this.ui.btnPause.style.background = '#444';
                    this.ui.btnPause.style.color = '#fff';
                } else {
                    try { this.recognition.start(); } catch(e){} // Reinicia
                    this.ui.btnPause.innerHTML = '<svg fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>Pausar';
                    this.ui.btnPause.style.background = 'var(--primary)';
                    this.ui.btnPause.style.color = '#000';
                }
            }

            stopSession() {
                this.isRecording = false;
                this.isPaused = false;
                this.recognition.stop();
                this.releaseWakeLock();

                // Cerrar la última danza
                if (this.activeEntryId) {
                    const prevEntry = this.logEvents.find(e => e.id === this.activeEntryId);
                    if (prevEntry && !prevEntry.endTime) {
                        const now = new Date();
                        prevEntry.endTime = String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ':' + String(now.getSeconds()).padStart(2, '0');
                        const outSpan = document.getElementById(`out-${this.activeEntryId}`);
                        if (outSpan) outSpan.innerText = prevEntry.endTime;
                    }
                }

                this.ui.btnRecord.style.display = 'flex';
                this.ui.btnPause.style.display = 'none';
                this.ui.btnStop.style.display = 'none';
            }

            // --- EXPORTACIÓN EXCEL NATIVA (.XLSX) ---
            calcularDesfaseMs() {
                const eVal = this.ui.timeExif.value;
                const aVal = this.ui.timeApp.value;
                if (!eVal || !aVal) return 0;
                const dExif = new Date("1970-01-01T" + eVal + "Z");
                const dApp = new Date("1970-01-01T" + aVal + "Z");
                return dExif.getTime() - dApp.getTime();
            }

            aplicarDesfase(horaStr, ms) {
                if (!horaStr || ms === 0) return horaStr || "";
                let d = new Date("1970-01-01T" + horaStr + "Z");
                d.setTime(d.getTime() + ms);
                return String(d.getUTCHours()).padStart(2, '0') + ':' + 
                       String(d.getUTCMinutes()).padStart(2, '0') + ':' + 
                       String(d.getUTCSeconds()).padStart(2, '0');
            }

            exportRealExcel() {
                if (this.originalData.length === 0) {
                    alert("Por favor, carga el archivo Excel del evento primero.");
                    return;
                }

                const desfaseMs = this.calcularDesfaseMs();
                
                // Clonamos la data original para no modificar el archivo base en memoria
                let finalData = this.originalData.map(row => [...row]);
                
                // Agregamos las cabeceras nuevas a la fila 0
                finalData[0].push("Inicio_App", "Inicio_Camara", "Fin_App", "Fin_Camara", "Texto_Escuchado");

                // Cruzamos datos
                for (let i = 1; i < finalData.length; i++) {
                    let numStr = String(finalData[i][0] || "").trim();
                    // Buscar si ese número fue registrado
                    let logMatch = this.logEvents.find(log => String(log.num) === numStr);
                    
                    if (logMatch) {
                        let camIn = this.aplicarDesfase(logMatch.startTime, desfaseMs);
                        let camOut = logMatch.endTime ? this.aplicarDesfase(logMatch.endTime, desfaseMs) : "";
                        finalData[i].push(logMatch.startTime, camIn, logMatch.endTime, camOut, logMatch.raw);
                    } else {
                        // Si no se bailó o no se anunció, dejar columnas vacías
                        finalData[i].push("", "", "", "", "");
                    }
                }

                // Generar el archivo real .xlsx usando SheetJS
                const ws = XLSX.utils.aoa_to_sheet(finalData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Danzas_Sincronizadas");
                
                // Descargar archivo binario Excel (.xlsx)
                XLSX.writeFile(wb, "AuxiliorPhoto_Sync.xlsx");
            }
        }

        // Inicializar aplicación
        window.onload = () => {
            const app = new TheaterLogger();
        };
    </script>
</body>
</html>
