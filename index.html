<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podium Audio Log - Smart Sync</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #121212; color: #e0e0e0; text-align: center; padding: 20px; margin: 0; }
        .header { margin-bottom: 20px; }
        .clock { font-size: 3em; font-weight: bold; color: #00ff88; margin: 10px auto; border: 2px solid #333; padding: 10px 20px; border-radius: 10px; display: inline-block; letter-spacing: 2px; background: #000; }

        .ref-container { width: 100%; max-width: 600px; background: #1e1e1e; padding: 15px; border-radius: 8px; margin: 0 auto 15px auto; border: 1px solid #333; text-align: left; box-sizing: border-box; }
        .ref-title { font-size: 0.85em; color: #aaa; margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 1px; }

        .sheets-row { display: flex; gap: 10px; }
        .sheets-input { flex-grow: 1; padding: 12px; background: #000; color: #fff; border: 1px solid #444; border-radius: 5px; font-size: 1em; box-sizing: border-box; }
        .sheets-btn { background: #0f9d58; color: white; border: none; padding: 12px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        input[type="file"] { color: #fff; background: #000; padding: 10px; border-radius: 5px; width: 100%; box-sizing: border-box; border: 1px solid #444; }
        #excel-preview { margin-top: 10px; max-height: 150px; overflow-y: auto; background: #000; border: 1px solid #444; border-radius: 5px; display: none; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        th, td { border: 1px solid #333; padding: 8px; text-align: left; }
        th { background: #333; color: #ffcc00; position: sticky; top: 0; }

        .btn { padding: 18px 30px; font-size: 1.2em; font-weight: bold; cursor: pointer; border-radius: 50px; border: none; width: 100%; max-width: 600px; margin: 10px auto; display: block; transition: 0.2s; }
        .start { background: #e50914; color: white; box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); }
        .stop { background: #333; color: white; border: 2px solid #e50914; }
        .pause { background: #ffcc00; color: #000; border: 2px solid #ffcc00; }
        .export { background: #007bff; color: white; margin-top: 20px; }

        #log { text-align: left; background: #1a1a1a; padding: 15px; border-radius: 10px; height: 35vh; overflow-y: auto; margin: 15px auto; border: 1px solid #333; width: 100%; max-width: 600px; box-sizing: border-box; }
        .entry { display: flex; align-items: center; justify-content: space-between; background: #222; margin-bottom: 10px; padding: 12px; border-radius: 6px; border-left: 4px solid #ffcc00; }
        .entry-left { display: flex; align-items: center; gap: 15px; flex-grow: 1; }
        .time { color: #888; font-family: monospace; font-size: 1em; }
        .time-box { display: flex; flex-direction: column; min-width: 90px; }

        .edit-num { background: #000; color: #ffcc00; border: 1px dashed #666; font-size: 1.3em; font-weight: bold; width: 70px; text-align: center; padding: 8px; border-radius: 4px; }
        .edit-num:focus { border-color: #ffcc00; outline: none; background: #111; }

        .raw-text { color: #aaa; font-size: 0.9em; font-style: italic; max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; }
        .matched-data { color: #00ff88; font-size: 0.8em; font-weight: bold; margin-top: 5px; display: block; }
        .delete-btn { background: transparent; border: none; color: #ff4444; font-size: 1.5em; cursor: pointer; padding: 5px 10px; }

        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin: 0; color: #fff;">PODIUM <span style="color:#ffcc00">Logger</span></h2>
        <div id="clock" class="clock">00:00:00</div>
    </div>

    <script>
        setInterval(function() {
            var date = new Date();
            var hours = String(date.getHours()).padStart(2, '0');
            var minutes = String(date.getMinutes()).padStart(2, '0');
            var seconds = String(date.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = hours + ':' + minutes + ':' + seconds;
        }, 1000);
    </script>

    <div class="ref-container">
        <span class="ref-title">📁 1. Cargar Archivo de Excel/CSV (Orden del día)</span>
        <input type="file" id="fileUpload" accept=".xlsx, .xls, .csv, .ods">
        <div id="excel-preview"></div>
    </div>

    <div class="ref-container">
        <span class="ref-title">📸 2. Calibración de Cámara</span>
        <div style="display: flex; gap: 10px; margin-bottom: 5px;">
            <div style="flex: 1;">
                <small style="color:#888; display:block; margin-bottom:3px;">Hora EXIF de cámara</small>
                <input type="time" step="1" id="timeExif" class="sheets-input">
            </div>
            <div style="flex: 1;">
                <small style="color:#888; display:block; margin-bottom:3px;">Hora reloj App</small>
                <input type="time" step="1" id="timeApp" class="sheets-input">
            </div>
        </div>
    </div>

    <button id="startBtn" class="btn start">⏺ INICIAR GRABACIÓN</button>
    <button id="pauseBtn" class="btn pause" style="display:none;">⏸ PAUSAR (Música)</button>
    <button id="stopBtn" class="btn stop" style="display:none;">⏹ DETENER</button>

    <div id="log">
        <div style="text-align:center; color:#666; margin-top:20px;">Esperando anuncios...<br><small>(Baja el volumen de tu teléfono a cero para evitar pitidos)</small></div>
    </div>

    <button id="exportBtn" class="btn export">⬇ DESCARGAR CSV FINAL</button>

    <script>
        let logEntries = [];
        let loadedFileName = "Ninguno";
        let excelHeaders = [];
        let excelDataRows = [];
        let isPaused = false;
        const logDiv = document.getElementById('log');

        // --- LECTURA Y PROCESAMIENTO DEL EXCEL ---
        document.getElementById('fileUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            loadedFileName = file.name;
            const reader = new FileReader();

            reader.onload = function(evt) {
                try {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, {type: 'binary'});
                    const worksheet = workbook.Sheets[workbook.SheetNames[0]];

                    const jsonData = XLSX.utils.sheet_to_json(worksheet, {header: 1, defval: ""});
                    if (jsonData.length > 0) {
                        excelHeaders = jsonData[0]; 
                        excelDataRows = jsonData.slice(1); 
                    }

                    const htmlTable = XLSX.utils.sheet_to_html(worksheet);
                    document.getElementById('excel-preview').innerHTML = htmlTable;
                    document.getElementById('excel-preview').style.display = 'block';
                } catch (err) { alert("Error leyendo Excel."); }
            };
            reader.readAsBinaryString(file);
        });

        window.buscarEnExcel = function(num) {
            if (excelDataRows.length === 0) return `Número: ${num}`; 
            const fila = excelDataRows.find(row => String(row[0]).trim() === String(num).trim());

            if (fila) {
                let detalles = [];
                for (let i = 0; i < excelHeaders.length; i++) {
                    if (excelHeaders[i] && fila[i] !== "") {
                        detalles.push(`${excelHeaders[i]}: ${fila[i]}`);
                    }
                }
                return detalles.join(", ");
            } else {
                return `Número: ${num} (No encontrado en Excel)`;
            }
        };

        window.actualizarNumero = function(id, nuevoValor) {
            const entry = logEntries.find(e => e.id === id);
            if(entry) {
                entry.num = nuevoValor;
                entry.fullData = window.buscarEnExcel(nuevoValor); 

                const spanDatos = document.getElementById('data-' + id);
                if(spanDatos) spanDatos.innerText = entry.fullData;
            }
        };

        window.eliminarRegistro = function(id) {
            logEntries = logEntries.filter(e => e.id !== id);
            const el = document.getElementById('entry-' + id);
            if(el) el.remove();
        };

        // --- RECONOCIMIENTO DE VOZ ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'es-PY';

            recognition.onresult = function(event) {
                if (isPaused) return; // Si está en pausa, ignora el audio capturado

                const result = event.results[event.results.length - 1][0].transcript;
                const d = new Date();
                const time = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0');
                const numbers = result.match(/\d+/g);

                if (numbers) {
                    if(logEntries.length === 0) logDiv.innerHTML = '';

                    // Cerrar el tiempo del evento anterior
                    if (logEntries.length > 0) {
                        let lastEntry = logEntries[logEntries.length - 1];
                        if (!lastEntry.endTime) {
                            lastEntry.endTime = time;
                            let finSpan = document.getElementById('fin-' + lastEntry.id);
                            if(finSpan) finSpan.innerText = `Fin: ${time}`;
                        }
                    }

                    numbers.forEach(num => {
                        const entryId = Date.now() + Math.floor(Math.random() * 1000);
                        const datosCompletos = window.buscarEnExcel(num);

                        // Se guarda con startTime y endTime vacío
                        logEntries.push({ id: entryId, startTime: time, endTime: "", num: num, raw: result, fullData: datosCompletos });

                        const div = document.createElement('div');
                        div.className = 'entry';
                        div.id = 'entry-' + entryId;
                        div.innerHTML = `
                            <div class="entry-left">
                                <div class="time-box">
                                    <span class="time" style="color:#00ff88; font-size:0.9em;">Inicio: ${time}</span>
                                    <span class="time" id="fin-${entryId}" style="color:#ff4444; font-size:0.9em;">Fin: --:--:--</span>
                                </div>
                                <input type="number" class="edit-num" value="${num}" onchange="actualizarNumero(${entryId}, this.value)">
                                <div style="display:flex; flex-direction:column; text-align:left;">
                                    <span class="raw-text">"${result}"</span>
                                    <span class="matched-data" id="data-${entryId}">${datosCompletos}</span>
                                </div>
                            </div>
                            <button class="delete-btn" onclick="eliminarRegistro(${entryId})">✖</button>
                        `;
                        logDiv.prepend(div);
                    });
                }
            };

            let isRecording = false;
            recognition.onend = function() { if(isRecording) { try { recognition.start(); } catch(e) {} } };

            document.getElementById('startBtn').onclick = function() {
                try {
                    recognition.start();
                    isRecording = true;
                    isPaused = false;
                    document.getElementById('startBtn').style.display = 'none';
                    document.getElementById('pauseBtn').style.display = 'block';
                    document.getElementById('pauseBtn').innerText = '⏸ PAUSAR (Música)';
                    document.getElementById('stopBtn').style.display = 'block';
                } catch(e) { alert("Error. Recuerda usar Chrome y dar permisos."); }
            };

            document.getElementById('pauseBtn').onclick = function() {
                isPaused = !isPaused;
                if (isPaused) {
                    this.innerText = '▶ REANUDAR (Hablar)';
                    this.style.background = '#444';
                    this.style.color = '#fff';
                } else {
                    this.innerText = '⏸ PAUSAR (Música)';
                    this.style.background = '#ffcc00';
                    this.style.color = '#000';
                }
            };

            document.getElementById('stopBtn').onclick = function() {
                recognition.stop();
                isRecording = false;
                isPaused = false;

                // Si se detiene manualmente, cerrar la última danza con la hora actual
                if (logEntries.length > 0) {
                    let lastEntry = logEntries[logEntries.length - 1];
                    if (!lastEntry.endTime) {
                        const d = new Date();
                        const time = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0');
                        lastEntry.endTime = time;
                        let finSpan = document.getElementById('fin-' + lastEntry.id);
                        if(finSpan) finSpan.innerText = `Fin: ${time}`;
                    }
                }

                document.getElementById('startBtn').style.display = 'block';
                document.getElementById('pauseBtn').style.display = 'none';
                document.getElementById('stopBtn').style.display = 'none';
            };
        } else {
            document.getElementById('startBtn').onclick = function() { alert("Tu navegador no soporta voz. Usa Chrome."); };
        }

        // --- CÁLCULOS Y EXPORTACIÓN ---
        function calcularDesfase(exifStr, appStr) {
            if(!exifStr || !appStr) return 0;
            let dExif = new Date("1970-01-01T" + exifStr + "Z");
            let dApp = new Date("1970-01-01T" + appStr + "Z");
            return dExif.getTime() - dApp.getTime();
        }

        function aplicarDesfase(horaStr, desfaseMs) {
            if(!horaStr || desfaseMs === 0) return horaStr || "";
            let d = new Date("1970-01-01T" + horaStr + "Z");
            d.setTime(d.getTime() + desfaseMs);
            return String(d.getUTCHours()).padStart(2, '0') + ':' +
                   String(d.getUTCMinutes()).padStart(2, '0') + ':' +
                   String(d.getUTCSeconds()).padStart(2, '0');
        }

        document.getElementById('exportBtn').onclick = function() {
            const timeExif = document.getElementById('timeExif').value;
            const timeApp = document.getElementById('timeApp').value;
            const desfaseMs = calcularDesfase(timeExif, timeApp);

            let csvContent = "data:text/csv;charset=utf-8,";

            if (excelHeaders.length > 0) {
                // Reconstruye el archivo tal cual entró, sumando las columnas de tiempo al final
                let encabezados = excelHeaders.map(h => '"' + String(h).replace(/"/g, '""') + '"').join(";");
                csvContent += encabezados + ';"Inicio_App";"Inicio_Camara";"Fin_App";"Fin_Camara"\n';

                excelDataRows.forEach(row => {
                    let numStr = String(row[0] || "").trim();
                    // Busca el último registro de log para este número
                    let entry = logEntries.slice().reverse().find(e => String(e.num).trim() === numStr);

                    let rowStr = row.map(cell => '"' + String(cell !== undefined ? cell : "").replace(/"/g, '""') + '"').join(";");

                    if (entry) {
                        let inicioC = aplicarDesfase(entry.startTime, desfaseMs);
                        let finC = entry.endTime ? aplicarDesfase(entry.endTime, desfaseMs) : "";
                        rowStr += `;"${entry.startTime}";"${inicioC}";"${entry.endTime}";"${finC}"\n`;
                    } else {
                        rowStr += `;"";"";"";""\n`; // Deja en blanco si no se bailó / anunció
                    }
                    csvContent += rowStr;
                });
            } else {
                // Modo fallback si no subió excel (solo descarga el log)
                csvContent += "Numero;Datos_Completos;Inicio_App;Inicio_Camara;Fin_App;Fin_Camara;Transcripcion\n";
                logEntries.forEach(e => {
                    let inicioC = aplicarDesfase(e.startTime, desfaseMs);
                    let finC = e.endTime ? aplicarDesfase(e.endTime, desfaseMs) : "";
                    let datosSeguros = e.fullData.replace(/"/g, '""');
                    csvContent += `${e.num};"${datosSeguros}";${e.startTime};${inicioC};${e.endTime};${finC};"${e.raw}"\n`;
                });
            }

            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", "PodiumLog_Sincronizado_" + new Date().getTime() + ".csv");
            document.body.appendChild(link);
            link.click();
        };
    </script>
</body>
</html>
